services:
  - type: web
    name: stockpilot-inventory
    runtime: docker
    region: frankfurt
    plan: free
    healthCheckPath: /api/health
    autoDeployTrigger: checksPass
    maxShutdownDelaySeconds: 30
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_FORWARDEDHEADERS_ENABLED
        value: true
      - key: Deployment__EnforceHttps
        value: true
      - key: Deployment__RequireCurrentMigration
        value: true
      - key: Database__ApplyMigrationsOnStartup
        value: "true"
      - key: SeedDemoData
        value: false
      - key: Bootstrap__AdminOnStartup
        value: "true"
      - key: Bootstrap__AdminName
        value: StockPilot Admin
      - key: Bootstrap__WorkspaceName
        value: StockPilot
      - key: Bootstrap__WorkspaceSlug
        value: stockpilot
      - key: Bootstrap__CurrencyCode
        value: USD
      - key: AI__SmartIntake__Enabled
        value: "true"
      - key: AI__SmartIntake__Provider
        value: Gemini
      - key: AI__SmartIntake__Model
        value: gemini-3.5-flash-lite
      - key: AI__SmartIntake__Endpoint
        value: https://generativelanguage.googleapis.com/v1beta/openai/chat/completions
      - key: Bootstrap__AdminEmail
        sync: false
      - key: Bootstrap__AdminPassword
        sync: false
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: AI__SmartIntake__ApiKey
        sync: false
